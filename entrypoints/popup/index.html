<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      :root { color-scheme: light dark; }
      html, body { margin: 0; padding: 0; }
      body {
        min-width: 280px;
        max-width: 360px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 14px;
        color: #212121;
        background: #fafafa;
      }
      .pane { padding: 14px 16px; }
      .label { font-size: 12px; color: #777; margin: 0 0 4px; }
      .url {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
        word-break: break-all;
        background: #fff;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
        padding: 8px 10px;
        margin: 0 0 12px;
      }
      .note { font-size: 12px; color: #777; margin: 8px 0 0; }
      .error { color: #c62828; }
      button {
        font: inherit;
        width: 100%;
        padding: 9px 14px;
        border: 1px solid #1565c0;
        background: #1976d2;
        color: #fff;
        border-radius: 6px;
        cursor: pointer;
      }
      button:hover { background: #1565c0; }
      [hidden] { display: none !important; }
      @media (prefers-color-scheme: dark) {
        body { background: #242424; color: #e0e0e0; }
        .url { background: #1a1a1a; border-color: #3a3a3a; }
        .label, .note { color: #aaa; }
      }
    </style>
  </head>
  <body>
    <div class="pane">
      <p id="empty" class="note" hidden>No recent QR read.</p>

      <div id="result" hidden>
        <p class="label" id="result-label">Decoded URL</p>
        <div class="url" id="url-text"></div>
        <button id="open" type="button" hidden>Open</button>
        <p class="note" id="not-openable" hidden>
          Not a web link, so it can't be opened.
        </p>
      </div>

      <p id="error" class="error" hidden></p>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
